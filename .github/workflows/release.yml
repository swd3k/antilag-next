name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore AntiLagNext/AntiLagNext.sln

      - name: Build
        run: dotnet build AntiLagNext/AntiLagNext.sln -c Release --no-restore

      - name: Unit tests
        run: dotnet test AntiLagNext/tests/AntiLagNext.Core.Tests/AntiLagNext.Core.Tests.csproj -c Release --no-build --verbosity normal

      - name: Smoke tests (Win32)
        run: dotnet test AntiLagNext/tests/AntiLagNext.SmokeTests/AntiLagNext.SmokeTests.csproj -c Release --verbosity normal

      - name: Multi-arch publish (x64, x86, ARM64)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $rids = @("win-x64", "win-x86", "win-arm64")
          $uiProj = "AntiLagNext/src/AntiLagNext.Ui/AntiLagNext.Ui.csproj"
          $cliProj = "AntiLagNext/src/AntiLagNext.Cli/AntiLagNext.Cli.csproj"
          New-Item -ItemType Directory -Force -Path dist | Out-Null

          foreach ($rid in $rids) {
            $uiOut = "dist/AntiLagNext-$rid"
            $cliOut = "dist/AntiLagNext-cli-$rid"
            Write-Host "=== Publish $rid ===" -ForegroundColor Cyan

            dotnet publish $uiProj -c Release -r $rid --self-contained false `
              -p:PublishSingleFile=false -p:DebugType=None -p:DebugSymbols=false -o $uiOut
            if ($LASTEXITCODE -ne 0) { throw "UI publish failed: $rid" }

            # Ensure wwwroot
            if (-not (Test-Path "$uiOut/wwwroot/index.html")) {
              New-Item -ItemType Directory -Force -Path "$uiOut/wwwroot" | Out-Null
              Copy-Item "AntiLagNext/src/AntiLagNext.Ui/wwwroot/*" "$uiOut/wwwroot" -Recurse -Force
            }
            if (Test-Path "LICENSE") { Copy-Item "LICENSE" $uiOut -Force }
            if (Test-Path "AntiLagNext/src/AntiLagNext.Ui/Assets/app.ico") {
              Copy-Item "AntiLagNext/src/AntiLagNext.Ui/Assets/app.ico" "$uiOut/logo.ico" -Force
            }

            $uiMb = [math]::Round(((Get-ChildItem $uiOut -Recurse -File | Measure-Object Length -Sum).Sum) / 1MB, 2)
            Write-Host "UI $rid size: $uiMb MB"
            if ($uiMb -gt 5) { throw "UI $rid exceeds 5 MB gate ($uiMb MB)" }

            dotnet publish $cliProj -c Release -r $rid --self-contained false `
              -p:PublishSingleFile=false -p:DebugType=None -p:DebugSymbols=false -o $cliOut
            if ($LASTEXITCODE -ne 0) { throw "CLI publish failed: $rid" }
            if (Test-Path "LICENSE") { Copy-Item "LICENSE" $cliOut -Force }

            Compress-Archive -Path "$uiOut/*" -DestinationPath "dist/AntiLagNext-$rid.zip" -Force
            Compress-Archive -Path "$cliOut/*" -DestinationPath "dist/AntiLagNext-cli-$rid.zip" -Force
            Write-Host "Zips ready for $rid"
          }

          Get-ChildItem dist -File -Filter "*.zip" | ForEach-Object {
            "{0,8:N2} MB  {1}" -f ($_.Length/1MB), $_.Name
          }

      - name: Install Inno Setup
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          # Do not let native command non-zero exits kill the step (ISCC /? returns 1).
          $PSNativeCommandUseErrorActionPreference = $false

          $url = "https://github.com/jrsoftware/issrc/releases/download/is-6_7_3/innosetup-6.7.3.exe"
          $installer = Join-Path $env:RUNNER_TEMP "innosetup-6.7.3.exe"
          $dest = Join-Path $env:RUNNER_TEMP "InnoSetup6"
          Write-Host "Downloading Inno Setup from $url"
          Invoke-WebRequest -Uri $url -OutFile $installer -UseBasicParsing
          if (Test-Path $dest) { Remove-Item $dest -Recurse -Force }
          New-Item -ItemType Directory -Force -Path $dest | Out-Null

          # Portable silent install into RUNNER_TEMP (no admin)
          $args = @(
            "/VERYSILENT", "/SUPPRESSMSGBOXES", "/NORESTART", "/SP-",
            "/CURRENTUSER", "/PORTABLE=1", "/NOICONS",
            "/DIR=$dest"
          )
          Write-Host "Installing: $installer $($args -join ' ')"
          $p = Start-Process -FilePath $installer -ArgumentList $args -Wait -PassThru
          Write-Host "Installer exit code: $($p.ExitCode)"
          if ($p.ExitCode -ne 0) {
            throw "Inno Setup installer exit code $($p.ExitCode)"
          }

          $iscc = Join-Path $dest "ISCC.exe"
          if (-not (Test-Path $iscc)) {
            $found = Get-ChildItem $dest -Recurse -Filter "ISCC.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($found) { $iscc = $found.FullName }
          }
          if (-not (Test-Path $iscc)) {
            $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          }
          if (-not (Test-Path $iscc)) {
            $iscc = "${env:ProgramFiles}\Inno Setup 6\ISCC.exe"
          }
          if (-not (Test-Path $iscc)) {
            Write-Host "Contents of $dest :"
            Get-ChildItem $dest -ErrorAction SilentlyContinue | ForEach-Object { $_.Name }
            throw "ISCC.exe not found after Inno Setup install"
          }

          Write-Host "ISCC: $iscc"
          "ISCC_PATH=$iscc" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          # Verify compiler starts (ISCC with no args / help often exits 1 — ignore)
          & $iscc 2>&1 | Select-Object -First 3 | ForEach-Object { Write-Host $_ }
          Write-Host "Inno Setup ready (ISCC exit ignored: $LASTEXITCODE)"

      - name: Build Setup.exe installers
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $false
          $tag = "${{ github.ref_name }}"
          $ver = $tag.TrimStart("v", "V")
          if ($ver -notmatch '^\d+\.\d+\.\d+') {
            Write-Host "Tag $tag is not semver — using 1.0.0 for VersionInfo"
            $ver = "1.0.0"
          }
          Write-Host "Installer version: $ver (tag=$tag)"
          $isccArg = @{}
          if ($env:ISCC_PATH -and (Test-Path $env:ISCC_PATH)) {
            $isccArg["IsccPath"] = $env:ISCC_PATH
            Write-Host "Using ISCC from env: $($env:ISCC_PATH)"
          }
          & .\scripts\build-installer.ps1 -Version $ver -Rid @("win-x64", "win-x86", "win-arm64") @isccArg
          if ($LASTEXITCODE -ne 0) { throw "build-installer.ps1 failed with exit $LASTEXITCODE" }
          Get-ChildItem dist\installers -Filter "*.exe" | ForEach-Object {
            "{0,8:N2} MB  {1}" -f ($_.Length/1MB), $_.Name
          }

      - name: Build release notes from CHANGELOG.md
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $tag = "${{ github.ref_name }}"
          $ver = $tag.TrimStart("v", "V")
          $text = Get-Content CHANGELOG.md -Raw -Encoding UTF8
          $pattern = "(?s)## \[$([regex]::Escape($ver))\][^\n]*\n(.*?)(?=\n## \[|\z)"
          $m = [regex]::Match($text, $pattern)
          if (-not $m.Success) { throw "No CHANGELOG section for version $ver" }
          $body = $m.Groups[1].Value.Trim()
          $body = [regex]::Replace($body, "\r?\n---\s*$", "").Trim()
          $header = "# AntiLag Next $tag`n`n"
          $footer = "`n`n---`n`n**Requirements:** Windows 10/11 · [.NET 8 Desktop Runtime](https://dotnet.microsoft.com/download/dotnet/8.0) · [WebView2](https://developer.microsoft.com/microsoft-edge/webview2/) · **Run as Administrator**`n`nFull history: [CHANGELOG.md](https://github.com/swd3k/antilag-next/blob/main/CHANGELOG.md) · [README](https://github.com/swd3k/antilag-next#readme)`n"
          $notes = $header + $body + $footer
          [System.IO.File]::WriteAllText("release_body.md", $notes, [System.Text.UTF8Encoding]::new($false))
          Write-Host "Wrote release_body.md for $tag ($($notes.Length) chars)"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: AntiLag Next ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: false
          body_path: release_body.md
          files: |
            dist/AntiLagNext-win-x64.zip
            dist/AntiLagNext-win-x86.zip
            dist/AntiLagNext-win-arm64.zip
            dist/AntiLagNext-cli-win-x64.zip
            dist/AntiLagNext-cli-win-x86.zip
            dist/AntiLagNext-cli-win-arm64.zip
            dist/installers/AntiLagNext-Setup-*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
