name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore AntiLagNext/AntiLagNext.sln

      - name: Build
        run: dotnet build AntiLagNext/AntiLagNext.sln -c Release --no-restore

      - name: Unit tests
        run: dotnet test AntiLagNext/tests/AntiLagNext.Core.Tests/AntiLagNext.Core.Tests.csproj -c Release --no-build --verbosity normal

      - name: Smoke tests (Win32)
        run: dotnet test AntiLagNext/tests/AntiLagNext.SmokeTests/AntiLagNext.SmokeTests.csproj -c Release --verbosity normal

      # Shipping host is Photino UI (legacy WPF App is not built by default)
      - name: Publish Photino UI
        run: >
          dotnet publish AntiLagNext/src/AntiLagNext.Ui/AntiLagNext.Ui.csproj
          -c Release -r win-x64 --self-contained false
          -o dist/AntiLagNext

      - name: Publish CLI
        run: >
          dotnet publish AntiLagNext/src/AntiLagNext.Cli/AntiLagNext.Cli.csproj
          -c Release -r win-x64 --self-contained false
          -o dist/AntiLagNext-cli

      - name: Size gate (UI ≤ 5 MB FDD)
        shell: pwsh
        run: |
          $sum = (Get-ChildItem dist/AntiLagNext -Recurse -File | Measure-Object Length -Sum).Sum
          $mb = [math]::Round($sum / 1MB, 2)
          Write-Host "UI package: $mb MB"
          if ($mb -gt 5) { throw "Size $mb MB exceeds 5 MB gate" }

      - name: Upload UI artifact
        uses: actions/upload-artifact@v4
        with:
          name: AntiLagNext-win-x64
          path: dist/AntiLagNext

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: AntiLagNext-cli-win-x64
          path: dist/AntiLagNext-cli
